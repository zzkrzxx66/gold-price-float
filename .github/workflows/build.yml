name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Download and setup Gradle
      run: |
        wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip -O /tmp/gradle.zip
        unzip -q /tmp/gradle.zip -d /opt/
        echo "/opt/gradle-8.5/bin" >> $GITHUB_PATH

    - name: Build Debug APK
      run: |
        gradle assembleDebug --no-daemon --stacktrace 2>&1 | tee build.log
        EXIT_CODE=${PIPESTATUS[0]}
        if [ $EXIT_CODE -ne 0 ]; then
          echo "::error::Build failed with exit code $EXIT_CODE"
          tail -100 build.log
          # Extract compilation errors
          grep -E "error:|FAILED|cannot find symbol|package .* does not exist" build.log || true
        fi
        exit $EXIT_CODE

    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: gold-price-float-debug
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 90
